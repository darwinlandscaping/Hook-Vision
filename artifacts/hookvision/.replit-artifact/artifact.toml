kind = "mobile"
previewPath = "/hookvision/"
title = "HookVision WA"
version = "1.0.0"
id = "artifacts/hookvision"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/hookvision" ]
localPort = 25351

[services.development]
run = "pnpm --filter @workspace/hookvision run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hookvision", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/hookvision", "run", "serve" ]

[services.env]
PORT = "25351"
BASE_PATH = "/hookvision"
