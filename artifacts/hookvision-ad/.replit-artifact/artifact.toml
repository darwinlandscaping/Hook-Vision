kind = "video"
previewPath = "/hookvision-ad/"
title = "HookVision Ad"
version = "1.0.0"
id = "artifacts/hookvision-ad"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/hookvision-ad/" ]
localPort = 25628

[services.development]
run = "pnpm --filter @workspace/hookvision-ad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hookvision-ad", "run", "build" ]
publicDir = "artifacts/hookvision-ad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25628"
BASE_PATH = "/hookvision-ad/"
