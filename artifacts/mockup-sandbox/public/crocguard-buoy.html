<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CrocGuard Buoy — Animation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#030d10;overflow:hidden;font-family:-apple-system,system-ui,sans-serif}

/* ── Sky / atmosphere ── */
.scene{position:relative;width:100%;height:100%;background:linear-gradient(180deg,#030d10 0%,#041820 40%,#051e2b 55%,#062535 65%)}

/* ── Stars ── */
.stars{position:absolute;inset:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:var(--a,0.7);transform:scale(1)}50%{opacity:0.2;transform:scale(0.7)}}

/* ── Moon ── */
.moon{position:absolute;top:40px;right:90px;width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#f5e6a0,#e8cc6a);box-shadow:0 0 30px rgba(245,230,160,0.4),0 0 60px rgba(245,230,160,0.1)}

/* ── Water ── */
.water{position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(180deg,#051f2e 0%,#031318 50%,#020c10 100%);overflow:hidden}
.water::before{content:'';position:absolute;top:0;left:-50%;width:200%;height:12px;background:linear-gradient(90deg,transparent,rgba(0,180,200,0.12),transparent,rgba(0,180,200,0.08),transparent);animation:waterShine 8s linear infinite}
@keyframes waterShine{from{transform:translateX(-25%)}to{transform:translateX(25%)}}

/* ── Wave layer ── */
.wave-svg{position:absolute;top:-1px;left:0;width:100%;overflow:visible}

/* ── Buoy container ── */
.buoy-wrap{position:absolute;left:50%;bottom:42%;transform:translateX(-50%);width:180px;animation:buoyFloat 4s ease-in-out infinite}
@keyframes buoyFloat{0%,100%{transform:translateX(-50%) translateY(0) rotate(0deg)}25%{transform:translateX(-50%) translateY(-8px) rotate(1.5deg)}75%{transform:translateX(-50%) translateY(4px) rotate(-1deg)}}

/* ── Mooring line ── */
.mooring{position:absolute;bottom:0;left:50%;width:2px;height:80px;transform:translateX(-50%);background:linear-gradient(180deg,rgba(100,80,40,0.6),rgba(80,60,20,0.3));transform-origin:top center}

/* ── Labels ── */
.label{position:absolute;font-size:11px;font-weight:700;letter-spacing:0.6px;color:rgba(200,240,255,0.7);text-transform:uppercase;white-space:nowrap}
.label::before{content:'';position:absolute;top:50%;width:30px;height:1px;background:rgba(200,240,255,0.25)}
.label.left{right:calc(100% + 36px);text-align:right}
.label.left::before{right:-33px}
.label.right{left:calc(100% + 36px)}
.label.right::before{left:-33px}

/* ── Status panel ── */
.status-panel{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:16px;align-items:center;background:rgba(5,30,40,0.85);border:1px solid rgba(0,200,220,0.15);border-radius:16px;padding:12px 22px;backdrop-filter:blur(8px)}
.status-dot{width:10px;height:10px;border-radius:50%;animation:statusPulse 2s ease-in-out infinite}
@keyframes statusPulse{0%,100%{box-shadow:0 0 0 0 currentColor}50%{box-shadow:0 0 0 6px transparent}}
.status-text{font-size:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase}

/* ── Sonar rings ── */
.sonar-ring{position:absolute;border-radius:50%;border:1.5px solid rgba(0,220,200,0.5);animation:sonarExpand 3s ease-out infinite}
.sonar-ring:nth-child(2){animation-delay:1s}
.sonar-ring:nth-child(3){animation-delay:2s}
@keyframes sonarExpand{0%{width:20px;height:20px;opacity:0.8;margin-left:-10px;margin-top:-10px}100%{width:300px;height:300px;opacity:0;margin-left:-150px;margin-top:-150px}}

/* ── Acoustic sound waves ── */
.sound-arc{position:absolute;border-radius:50%;border:2px solid rgba(255,100,0,0.7);animation:soundExpand 1.2s ease-out infinite;opacity:0}
.sound-arc:nth-child(2){animation-delay:0.4s}
.sound-arc:nth-child(3){animation-delay:0.8s}
@keyframes soundExpand{0%{width:30px;height:50px;opacity:0.9;margin-left:-15px;margin-top:-25px}100%{width:160px;height:200px;opacity:0;margin-left:-80px;margin-top:-100px}}
.sound-arcs{display:none}
.sound-arcs.firing{display:block}

/* ── Croc silhouette ── */
.croc-wrap{position:absolute;bottom:0;animation:crocApproach 12s ease-in-out infinite}
@keyframes crocApproach{
  0%{left:-200px;opacity:0}
  10%{opacity:0.6}
  45%{left:18%;opacity:0.7}
  55%{left:18%;opacity:0.7}
  65%{left:-200px;opacity:0}
  100%{left:-200px;opacity:0}
}

/* ── Croc eye glow ── */
.croc-eye{animation:eyeGlow 1s ease-in-out infinite alternate}
@keyframes eyeGlow{from{fill:rgba(255,50,0,0.6)}to{fill:rgba(255,100,0,1);filter:drop-shadow(0 0 4px #f00)}}

/* ── LED lights ── */
.led{animation:ledGreen 2s ease-in-out infinite}
@keyframes ledGreen{0%,100%{fill:#16c060;filter:drop-shadow(0 0 4px #0f0)}50%{fill:#12a050}}
.led.alert{animation:ledRed 0.5s ease-in-out infinite}
@keyframes ledRed{0%,100%{fill:#ff2020;filter:drop-shadow(0 0 8px #f00)}50%{fill:#cc0000}}

/* ── Camera pan ── */
.cam-head{transform-origin:50% 80%;animation:camPan 8s ease-in-out infinite}
@keyframes camPan{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}

/* ── Solar shimmer ── */
.solar-panel{animation:solarShimmer 4s ease-in-out infinite}
@keyframes solarShimmer{0%,100%{opacity:0.85}50%{opacity:1}}

/* ── Water ripple at buoy base ── */
.buoy-ripple{position:absolute;bottom:-4px;left:50%;border-radius:50%;border:1px solid rgba(0,180,200,0.3);animation:ripple 3s ease-out infinite}
.buoy-ripple:nth-child(2){animation-delay:1s}
.buoy-ripple:nth-child(3){animation-delay:2s}
@keyframes ripple{0%{width:40px;height:12px;margin-left:-20px;opacity:0.6}100%{width:200px;height:40px;margin-left:-100px;opacity:0}}

/* Alert overlay */
.alert-flash{position:absolute;inset:0;background:rgba(220,30,30,0);pointer-events:none;animation:none}
.alert-flash.active{animation:alertFlash 0.5s ease-in-out 3}
@keyframes alertFlash{0%,100%{background:rgba(220,30,30,0)}50%{background:rgba(220,30,30,0.08)}}

/* ── Title ── */
.title{position:absolute;top:22px;left:50%;transform:translateX(-50%);text-align:center;white-space:nowrap}
.title h1{font-size:22px;font-weight:900;color:#00d4e8;letter-spacing:1px;text-shadow:0 0 20px rgba(0,212,232,0.5)}
.title p{font-size:11px;color:rgba(0,200,220,0.5);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
</style>
</head>
<body>

<div class="scene" id="scene">

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Moon -->
  <div class="moon"></div>

  <!-- Title -->
  <div class="title">
    <h1>🐊 CrocGuard</h1>
    <p>AI Floating Deterrent Buoy</p>
  </div>

  <!-- Alert flash overlay -->
  <div class="alert-flash" id="alertFlash"></div>

  <!-- Water -->
  <div class="water">
    <svg class="wave-svg" viewBox="0 0 1440 40" preserveAspectRatio="none" height="40">
      <path id="wave1" fill="rgba(0,160,180,0.12)" d=""/>
      <path id="wave2" fill="rgba(0,140,160,0.08)" d=""/>
    </svg>

    <!-- Sonar rings (from below buoy) -->
    <div id="sonar-origin" style="position:absolute;left:50%;bottom:55%;pointer-events:none">
      <div class="sonar-ring"></div>
      <div class="sonar-ring"></div>
      <div class="sonar-ring"></div>
    </div>

    <!-- Croc silhouette -->
    <div class="croc-wrap" id="crocWrap">
      <svg width="220" height="60" viewBox="0 0 220 60" fill="none">
        <!-- Croc body -->
        <ellipse cx="110" cy="42" rx="95" ry="14" fill="rgba(20,50,20,0.75)"/>
        <!-- Head -->
        <path d="M200 35 Q230 38 218 48 Q205 52 185 46 Q175 40 200 35Z" fill="rgba(20,50,20,0.8)"/>
        <!-- Snout -->
        <path d="M215 38 Q235 40 230 44 Q218 46 210 43Z" fill="rgba(25,55,25,0.8)"/>
        <!-- Eye -->
        <circle class="croc-eye" cx="208" cy="37" r="4"/>
        <!-- Tail -->
        <path d="M15 42 Q0 35 5 28 Q12 38 20 40Z" fill="rgba(20,50,20,0.6)"/>
        <!-- Ridges on back -->
        <path d="M60 28 L65 22 L70 28 M90 25 L95 19 L100 25 M120 26 L125 20 L130 26 M150 28 L155 23 L160 28" stroke="rgba(30,60,30,0.8)" stroke-width="2" fill="none"/>
        <!-- Water line ripple around croc -->
        <ellipse cx="110" cy="42" rx="100" ry="4" fill="none" stroke="rgba(0,150,170,0.2)" stroke-width="1"/>
      </svg>
    </div>

  </div>

  <!-- Buoy -->
  <div class="buoy-wrap" id="buoyWrap">

    <!-- Water ripples at waterline -->
    <div class="buoy-ripple"></div>
    <div class="buoy-ripple"></div>
    <div class="buoy-ripple"></div>

    <!-- Labels -->
    <div class="label left" style="top:10px">Solar Panel</div>
    <div class="label right" style="top:48px">Camera + IR</div>
    <div class="label left" style="top:90px">Status LED</div>
    <div class="label right" style="top:120px">Speaker</div>
    <div class="label left" style="top:160px">Hull / Float</div>
    <div class="label right" style="top:200px">Sonar Array</div>

    <!-- Mooring line -->
    <div class="mooring"></div>

    <!-- Sound waves (shown when firing) -->
    <div class="sound-arcs" id="soundArcs" style="position:absolute;top:120px;left:50%">
      <div class="sound-arc"></div>
      <div class="sound-arc"></div>
      <div class="sound-arc"></div>
    </div>

    <!-- Main buoy SVG -->
    <svg id="buoySVG" width="180" height="280" viewBox="0 0 180 280" fill="none" xmlns="http://www.w3.org/2000/svg">

      <!-- Antenna -->
      <line x1="90" y1="8" x2="90" y2="40" stroke="#8ab" stroke-width="2"/>
      <circle cx="90" cy="7" r="3" fill="#00d4e8" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <!-- Antenna brace -->
      <line x1="84" y1="20" x2="90" y2="14" stroke="#6a8a9a" stroke-width="1" opacity="0.5"/>
      <line x1="96" y1="20" x2="90" y2="14" stroke="#6a8a9a" stroke-width="1" opacity="0.5"/>

      <!-- Solar panel mount -->
      <rect x="60" y="36" width="60" height="6" rx="2" fill="#334455"/>

      <!-- Solar panel -->
      <rect class="solar-panel" x="55" y="22" width="70" height="20" rx="3" fill="#1a2d4e" stroke="#2a4a6e" stroke-width="1"/>
      <!-- Solar cells grid -->
      <g stroke="#2a5080" stroke-width="0.5" opacity="0.8">
        <line x1="72" y1="22" x2="72" y2="42"/>
        <line x1="89" y1="22" x2="89" y2="42"/>
        <line x1="106" y1="22" x2="106" y2="42"/>
        <line x1="55" y1="31" x2="125" y2="31"/>
        <line x1="55" y1="36" x2="125" y2="36"/>
      </g>
      <!-- Solar shine -->
      <rect x="57" y="24" width="10" height="3" rx="1" fill="rgba(100,180,255,0.25)"/>
      <rect x="75" y="24" width="10" height="3" rx="1" fill="rgba(100,180,255,0.2)"/>

      <!-- Camera mount arm -->
      <rect x="86" y="42" width="8" height="18" rx="2" fill="#2a3a4a"/>
      <!-- Camera head (panning) -->
      <g class="cam-head" style="transform-origin:90px 54px">
        <rect x="74" y="48" width="32" height="20" rx="5" fill="#1e2e3e" stroke="#2a4a5e" stroke-width="1"/>
        <!-- Lens -->
        <circle cx="90" cy="58" r="7" fill="#0a1520" stroke="#1a3050" stroke-width="1.5"/>
        <circle cx="90" cy="58" r="4.5" fill="#060e18"/>
        <circle cx="90" cy="58" r="2.5" fill="#030810"/>
        <!-- Lens reflection -->
        <circle cx="87" cy="55" r="1" fill="rgba(100,180,255,0.4)"/>
        <!-- IR LEDs -->
        <circle cx="78" cy="52" r="2" fill="#1a0a00" stroke="#3a1a00" stroke-width="0.5"/>
        <circle cx="102" cy="52" r="2" fill="#1a0a00" stroke="#3a1a00" stroke-width="0.5"/>
        <circle cx="78" cy="64" r="2" fill="#1a0a00" stroke="#3a1a00" stroke-width="0.5"/>
        <circle cx="102" cy="64" r="2" fill="#1a0a00" stroke="#3a1a00" stroke-width="0.5"/>
        <!-- IR glow -->
        <circle cx="78" cy="52" r="2" fill="rgba(180,0,0,0.3)"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/></circle>
        <circle cx="102" cy="52" r="2" fill="rgba(180,0,0,0.3)"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
      </g>

      <!-- Top dome / head unit -->
      <ellipse cx="90" cy="90" rx="38" ry="10" fill="#1e3040" stroke="#2a4a5e" stroke-width="1"/>

      <!-- Main hull - cylinder body -->
      <rect x="52" y="88" width="76" height="120" rx="4" fill="url(#hullGrad)"/>

      <!-- Status LED panel -->
      <rect x="72" y="100" width="36" height="16" rx="4" fill="#0a1820" stroke="#1a3040" stroke-width="1"/>
      <!-- LED lights -->
      <circle class="led" id="led1" cx="83" cy="108" r="4" fill="#16c060"/>
      <circle class="led" id="led2" cx="90" cy="108" r="4" fill="#16c060"/>
      <circle class="led" id="led3" cx="97" cy="108" r="4" fill="#16c060"/>

      <!-- Brand text -->
      <text x="90" y="125" text-anchor="middle" font-size="7" font-weight="700" fill="rgba(0,180,200,0.6)" letter-spacing="1">CROCGUARD</text>
      <text x="90" y="133" text-anchor="middle" font-size="5" fill="rgba(0,160,180,0.4)" letter-spacing="0.5">AI BUOY v2</text>

      <!-- Speaker grille -->
      <rect x="68" y="138" width="44" height="28" rx="5" fill="#0d1e28" stroke="#1a3040" stroke-width="1"/>
      <!-- Speaker mesh lines -->
      <g stroke="#1a3040" stroke-width="0.7" opacity="0.8">
        <line x1="68" y1="143" x2="112" y2="143"/>
        <line x1="68" y1="148" x2="112" y2="148"/>
        <line x1="68" y1="153" x2="112" y2="153"/>
        <line x1="68" y1="158" x2="112" y2="158"/>
        <line x1="68" y1="163" x2="112" y2="163"/>
        <line x1="73" y1="138" x2="73" y2="166"/>
        <line x1="80" y1="138" x2="80" y2="166"/>
        <line x1="87" y1="138" x2="87" y2="166"/>
        <line x1="94" y1="138" x2="94" y2="166"/>
        <line x1="101" y1="138" x2="101" y2="166"/>
        <line x1="108" y1="138" x2="108" y2="166"/>
      </g>
      <!-- Speaker cone outline -->
      <circle cx="90" cy="152" r="10" fill="none" stroke="rgba(0,160,180,0.15)" stroke-width="1"/>

      <!-- Hull stripes / markings -->
      <rect x="52" y="170" width="76" height="4" rx="1" fill="rgba(255,150,0,0.5)"/>
      <rect x="52" y="176" width="76" height="4" rx="1" fill="rgba(255,150,0,0.3)"/>

      <!-- Waterline marking -->
      <rect x="52" y="185" width="76" height="2" rx="1" fill="rgba(0,200,220,0.3)"/>

      <!-- Lower hull -->
      <rect x="56" y="187" width="68" height="20" rx="3" fill="#152535" stroke="#1a3040" stroke-width="0.5"/>

      <!-- Bottom dome / sonar housing -->
      <ellipse cx="90" cy="208" rx="34" ry="10" fill="#1a2e3e" stroke="#2a4a5e" stroke-width="1"/>

      <!-- Sonar array elements -->
      <g fill="none" stroke="rgba(0,200,220,0.6)" stroke-width="1.5">
        <circle cx="90" cy="220" r="6">
          <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="90" cy="220" r="3" fill="rgba(0,200,220,0.3)"/>
      </g>
      <!-- Sonar mount points -->
      <circle cx="75" cy="218" r="3" fill="#1a3040" stroke="rgba(0,200,220,0.3)" stroke-width="1"/>
      <circle cx="105" cy="218" r="3" fill="#1a3040" stroke="rgba(0,200,220,0.3)" stroke-width="1"/>

      <!-- Keel / stabiliser fins -->
      <path d="M58 195 L48 215 L58 210Z" fill="#152030" stroke="#1a3040" stroke-width="0.5"/>
      <path d="M122 195 L132 215 L122 210Z" fill="#152030" stroke="#1a3040" stroke-width="0.5"/>

      <!-- Hull reflection / shine -->
      <rect x="56" y="92" width="8" height="110" rx="4" fill="rgba(255,255,255,0.04)"/>

      <!-- Gradients -->
      <defs>
        <linearGradient id="hullGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#0e2030"/>
          <stop offset="20%" stop-color="#1a3a50"/>
          <stop offset="50%" stop-color="#1e4060"/>
          <stop offset="80%" stop-color="#1a3a50"/>
          <stop offset="100%" stop-color="#0e2030"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <!-- Status panel -->
  <div class="status-panel" id="statusPanel">
    <div class="status-dot" id="statusDot" style="color:#16c060;background:#16c060"></div>
    <div class="status-text" id="statusText" style="color:#16c060">CLEAR — Waterway Safe</div>
    <div style="width:1px;height:16px;background:rgba(255,255,255,0.1)"></div>
    <div style="font-size:11px;color:rgba(0,200,220,0.6)">Sonar Active</div>
    <div style="width:1px;height:16px;background:rgba(255,255,255,0.1)"></div>
    <div style="font-size:11px;color:rgba(0,200,220,0.6)" id="confLabel">Confidence: —</div>
  </div>

</div>

<script>
// Generate stars
const starsEl = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random()*2+0.5;
  s.style.cssText = `
    width:${size}px;height:${size}px;
    top:${Math.random()*55}%;left:${Math.random()*100}%;
    --d:${2+Math.random()*4}s;--delay:-${Math.random()*4}s;--a:${0.4+Math.random()*0.6}
  `;
  starsEl.appendChild(s);
}

// Animate wave SVG
const w1 = document.getElementById('wave1');
const w2 = document.getElementById('wave2');
function buildWave(offset,amp,freq){
  const W=1440,pts=[];
  for(let x=0;x<=W;x+=20){
    const y = amp*Math.sin((x/W)*Math.PI*freq + offset);
    pts.push(`${x},${20+y}`);
  }
  return `M0,40 L0,${20+amp*Math.sin(offset)} ` +
    pts.map((p,i)=>i===0?`L${p}`:`L${p}`).join(' ') +
    ` L${W},40 Z`;
}
let wt=0;
function animWaves(){
  wt+=0.02;
  w1.setAttribute('d',buildWave(wt,8,2));
  w2.setAttribute('d',buildWave(wt+1,5,3));
  requestAnimationFrame(animWaves);
}
animWaves();

// Detection cycle state machine
const states = ['clear','caution','alert','firing','clear'];
let phase = 0;
const PHASE_MS = [5000, 2000, 2000, 3000, 3000];

const led1=document.getElementById('led1');
const led2=document.getElementById('led2');
const led3=document.getElementById('led3');
const statusDot=document.getElementById('statusDot');
const statusText=document.getElementById('statusText');
const confLabel=document.getElementById('confLabel');
const soundArcs=document.getElementById('soundArcs');
const alertFlash=document.getElementById('alertFlash');
const sonarOrigin=document.getElementById('sonar-origin');

function setLEDs(color, cls){
  [led1,led2,led3].forEach(l=>{ l.style.fill=color; l.className.baseVal=`led${cls?' '+cls:''}`; });
}
function setStatus(dot,text,conf){
  statusDot.style.color=dot; statusDot.style.background=dot;
  statusText.style.color=dot; statusText.textContent=text;
  confLabel.textContent=conf;
}
function setSonarColor(c){
  sonarOrigin.querySelectorAll('.sonar-ring').forEach(r=>r.style.borderColor=c);
}

function runPhase(p){
  switch(p%5){
    case 0: // CLEAR
      setLEDs('#16c060','');
      setStatus('#16c060','CLEAR — Waterway Safe','Confidence: —');
      soundArcs.classList.remove('firing');
      alertFlash.classList.remove('active');
      setSonarColor('rgba(0,220,200,0.5)');
      break;
    case 1: // CAUTION
      setLEDs('#d97706','');
      setStatus('#d97706','CAUTION — Movement Detected','Confidence: 62%');
      setSonarColor('rgba(220,180,0,0.6)');
      break;
    case 2: // ALERT
      setLEDs('#dc2626','alert');
      setStatus('#dc2626','⚠  ALERT — Croc Confirmed','Confidence: 91%');
      alertFlash.classList.add('active');
      setSonarColor('rgba(220,50,0,0.7)');
      break;
    case 3: // FIRING deterrent
      setLEDs('#dc2626','alert');
      setStatus('#ff4400','🔊 FIRING DETERRENT','Confidence: 91%');
      soundArcs.classList.add('firing');
      setTimeout(()=>alertFlash.classList.remove('active'),1500);
      break;
    case 4: // recovering → clear
      setLEDs('#16c060','');
      soundArcs.classList.remove('firing');
      setStatus('#16a34a','DETERRENT FIRED — Monitoring','Confidence: 12%');
      setSonarColor('rgba(0,220,200,0.5)');
      break;
  }
}

function tick(){
  runPhase(phase);
  setTimeout(()=>{ phase=(phase+1)%5; tick(); }, PHASE_MS[phase%5]);
}
tick();
</script>
</body>
</html>
